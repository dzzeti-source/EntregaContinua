name: Entrega Contínua - Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Instalar dependências
      run: npm ci
    
    - name: Validar HTML com HTMLHint
      run: npx htmlhint index.html
    
    - name: Verificar existência do index.html
      run: |
        if [ -f "index.html" ]; then
          echo "✅ index.html encontrado"
        else
          echo "❌ index.html não encontrado"
          exit 1
        fi
    
    - name: Executar build
      run: npm run build
    
    - name: Upload do artefato buildado
      uses: actions/upload-artifact@v4
      with:
        name: site-build
        path: build/
  
  deploy-to-pages:
    needs: validate-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Baixar artefato do build
      uses: actions/download-artifact@v4
      with:
        name: site-build
        path: ./_site
    
    - name: Configurar GitHub Pages
      uses: actions/configure-pages@v4
    
    - name: Upload para GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site
    
    - name: Deploy para GitHub Pages
      uses: actions/deploy-pages@v4
