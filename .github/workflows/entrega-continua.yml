name: Entrega Contínua - Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Validar HTML com ferramenta nativa
      run: |
        echo "🔍 Validando HTML..."
        if grep -q "<!DOCTYPE html>" index.html; then
          echo "✅ DOCTYPE encontrado"
        else
          echo "❌ DOCTYPE não encontrado"
          exit 1
        fi
        
        if grep -q "<title>" index.html; then
          echo "✅ Title encontrado"
        else
          echo "❌ Title não encontrado"
          exit 1
        fi
        
        if grep -q "<html" index.html; then
          echo "✅ Tag HTML encontrada"
        else
          echo "❌ Tag HTML não encontrada"
          exit 1
        fi
        
        echo "✅ Todas as validações passaram!"
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
